name: MACRO PULSE — Daily Update

on:
  schedule:
    # 22:00 UTC = 07:00 JST
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "対象日 YYYY-MM-DD (空白=昨日)"
        required: false
        default: ""
      recalc:
        description: "再計算モード (true で Surprise を全件再計算)"
        required: false
        default: "false"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: 05_requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r 05_requirements.txt

      - name: Ensure data directory
        run: mkdir -p data

      - name: Run update
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.recalc }}" = "true" ]; then
            python 05_main.py --recalc
          elif [ -n "${{ github.event.inputs.target_date }}" ]; then
            python 05_main.py --date "${{ github.event.inputs.target_date }}"
          else
            python 05_main.py
          fi

      - name: Commit CSV
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/05_economic_history.csv data/05_indicator_schedule.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
